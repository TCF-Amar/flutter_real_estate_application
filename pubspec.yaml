name: real_estate_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  dartz: ^0.10.1
  get: ^4.7.3
  flutter_dotenv: ^6.0.0
  equatable: ^2.0.8
  dio: ^5.9.1
  flutter_svg: ^2.2.3
  logger: ^2.6.2
  flutter_secure_storage: ^10.0.0
  carousel_slider: ^5.1.2
  syncfusion_flutter_sliders: ^32.2.5
  dropdown_flutter: ^1.0.3
  shimmer: ^3.0.0
  intl: ^0.20.2
  video_player: ^2.11.0
  chewie: ^1.13.0
  panorama_viewer: ^2.0.7
  easy_pie_chart: ^1.0.2
  pie_chart: ^5.4.0
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1
  permission_handler: ^12.0.1
  crop_your_image: ^2.0.0
  path_provider: ^2.1.5
  geolocator: ^14.0.2
  flutter_advanced_switch: ^3.1.0
  json_annotation: ^4.11.0
  dotted_border: ^3.1.0
  mobkit_dashed_border: ^0.0.8
  app_links: ^6.3.3
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  json_serializable: ^6.13.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/ 
    - assets/icons/ 
    - assets/translations/ 
    - .env.development

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
